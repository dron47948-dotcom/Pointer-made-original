<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Wanna Maker — Level List</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg:#fff; --surface:#f5f5f5; --card:#fafafa; --border:#e0e0e0; --text:#111; --sub:#666; --accent:#333; --accent-hover:#555; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; min-height:100vh; display:flex; justify-content:center; }
        .app { width:750px; min-height:100vh; background:var(--bg); border-left:1px solid var(--border); border-right:1px solid var(--border); }
        @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
        .auth-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.97); display:flex; align-items:center; justify-content:center; z-index:1000; }
        .auth-modal { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:28px; width:360px; }
        .auth-modal h2 { margin-bottom:20px; font-size:22px; text-align:center; }
        .auth-modal input { width:100%; padding:10px; border:1px solid var(--border); border-radius:6px; font-size:14px; margin-bottom:10px; font-family:inherit; }
        .auth-modal button { width:100%; padding:10px; background:var(--accent); border:none; border-radius:6px; color:#fff; font-size:14px; font-weight:600; cursor:pointer; margin-top:6px; }
        .auth-switch { text-align:center; margin-top:14px; color:var(--sub); font-size:12px; }
        .auth-switch span { color:var(--accent); cursor:pointer; font-weight:500; }
        .auth-error { color:#c62828; font-size:12px; text-align:center; margin-top:6px; }
        .logout-btn { background:var(--surface); border:1px solid var(--border); padding:6px 12px; border-radius:4px; color:var(--sub); cursor:pointer; font-size:12px; }
        .sign-in-btn { background:var(--accent); border:none; color:#fff; padding:6px 14px; border-radius:4px; cursor:pointer; font-size:12px; }
        .header { padding:18px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:rgba(255,255,255,0.95); backdrop-filter:blur(8px); z-index:50; border-bottom:1px solid var(--border); }
        .header-title { font-size:18px; font-weight:600; }
        .header-right { display:flex; align-items:center; gap:10px; }
        .guest-badge { color:var(--sub); font-size:12px; }
        .tabs { display:flex; padding:0 24px; border-bottom:1px solid var(--border); }
        .tab-btn { background:none; border:none; color:var(--sub); padding:8px 16px; font-size:12px; font-weight:500; cursor:pointer; border-bottom:2px solid transparent; }
        .tab-btn.active { color:var(--text); border-bottom-color:var(--accent); }
        .filter-bar { display:flex; gap:6px; padding:10px 24px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
        .filter-tag { padding:4px 12px; border-radius:14px; border:1px solid var(--border); cursor:pointer; font-size:11px; color:var(--sub); background:var(--surface); }
        .filter-tag.active { background:var(--accent); color:#fff; }
        .search-wrapper { padding:8px 24px; border-bottom:1px solid var(--border); }
        .search-input { width:100%; padding:8px 12px; background:var(--surface); border:1px solid var(--border); border-radius:6px; font-size:13px; outline:none; }
        .content { padding:10px 24px 100px; }
        .list-header { display:flex; justify-content:space-between; margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid var(--border); }
        .list-header-label { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--sub); font-weight:600; }
        .empty-state { text-align:center; padding:50px 20px; color:var(--sub); font-size:13px; }
        .level-list { display:flex; flex-direction:column; gap:1px; }
        .level-card { background:var(--card); border-bottom:1px solid var(--border); padding:12px 16px; display:flex; align-items:center; gap:12px; animation:fadeIn 0.25s ease; transition: transform 0.2s ease; }
        .level-card:hover { transform: scale(1.01); }
        .level-rank { font-size:11px; color:var(--sub); font-weight:600; min-width:32px; }
        .level-name { font-weight:500; font-size:13px; }
        .level-tags { display:flex; gap:3px; margin-top:3px; flex-wrap:wrap; }
        .level-tag { background:var(--surface); color:var(--sub); font-size:9px; padding:2px 7px; border-radius:3px; border:1px solid var(--border); }
        .level-difficulty { font-size:10px; color:var(--sub); margin-top:2px; }
        .new-badge { font-size:9px; padding:2px 7px; border-radius:3px; background:#e8f5e9; color:#2e7d32; margin-left:4px; }
        .bottom-bar { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:750px; padding:12px 24px; background:rgba(255,255,255,0.95); border-top:1px solid var(--border); display:none; z-index:40; }
        .add-btn { width:36px; height:36px; border-radius:6px; background:var(--accent); border:none; color:#fff; font-size:18px; cursor:pointer; }
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.3); display:flex; align-items:center; justify-content:center; z-index:100; opacity:0; pointer-events:none; }
        .modal-overlay.active { opacity:1; pointer-events:all; }
        .modal { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:22px 24px; width:380px; }
        .modal h2 { font-size:15px; margin-bottom:14px; }
        .modal label { display:block; font-size:10px; color:var(--sub); margin:12px 0 3px; text-transform:uppercase; }
        .modal input { width:100%; padding:8px 10px; border:1px solid var(--border); border-radius:4px; font-size:13px; }
        .modal-buttons { display:flex; gap:6px; margin-top:18px; justify-content:flex-end; }
        .btn-cancel { background:var(--surface); border:1px solid var(--border); padding:7px 16px; border-radius:4px; cursor:pointer; }
        .btn-ok { background:var(--accent); color:#fff; border:none; padding:7px 16px; border-radius:4px; cursor:pointer; }
        .tag-suggestions { position:absolute; top:100%; left:0; right:0; background:var(--bg); border:1px solid var(--border); max-height:120px; overflow-y:auto; z-index:101; display:none; }
        .tag-suggestions.show { display:block; }
        .tag-suggestion-item { padding:7px 10px; font-size:11px; cursor:pointer; }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="header">
        <div class="header-left"><div class="header-title">I Wanna Maker <span style="color:var(--sub);font-weight:400;">— Level List</span></div></div>
        <div class="header-right">
            <span class="guest-badge" id="guestBadge">Guest</span>
            <button class="sign-in-btn" id="signInBtn">Sign In</button>
            <button class="logout-btn" id="logoutBtn" style="display:none;">Exit</button>
        </div>
    </div>
    <div class="tabs">
        <button class="tab-btn active" data-tab="all">All</button>
        <button class="tab-btn" data-tab="new">New</button>
    </div>
    <div class="filter-bar" id="filterBar"><span class="filter-tag active" data-tag="">All</span></div>
    <div class="search-wrapper"><input type="text" class="search-input" id="searchInput" placeholder="Search by name or tag..."></div>
    <div class="content">
        <div class="list-header"><span class="list-header-label" id="listHeaderLabel">Levels</span><span style="font-size:9px;color:var(--sub);" id="listCount">0</span></div>
        <div class="empty-state" id="emptyState">List is empty</div>
        <div class="level-list" id="levelList"></div>
    </div>
</div>
<div class="bottom-bar" id="bottomBar"><button class="add-btn" id="addBtn">+</button></div>
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2>New Level</h2>
        <label>Name</label><input type="text" id="levelNameInput" placeholder="Enter name">
        <label>Difficulty</label><input type="number" id="levelDifficultyInput" placeholder="0" min="0">
        <label>Tags</label><input type="text" id="levelTagsInput" placeholder="e.g. needle, boss">
        <div class="tag-suggestions" id="tagSuggestions"></div>
        <p style="font-size:9px;color:var(--sub);margin-top:2px;">Separate tags with commas</p>
        <div class="modal-buttons"><button class="btn-cancel" id="modalCancel">Cancel</button><button class="btn-ok" id="modalOk">OK</button></div>
    </div>
</div>
<div class="auth-overlay" id="authOverlay" style="display:none;">
    <div class="auth-modal">
        <h2>I Wanna Maker List</h2>
        <input type="email" id="authEmail" placeholder="Email"><input type="password" id="authPassword" placeholder="Password">
        <button id="authSubmitBtn">Sign In</button>
        <div class="auth-switch"><span id="authSwitchBtn">Create account</span></div>
        <div class="auth-error" id="authError"></div>
    </div>
</div>
<script>
const sb = window.supabase.createClient('https://msnijweenzlyqvcjhefx.supabase.co','sb_publishable_Rdz9P50sdBvpscdi79cYZg_xHndxy1B');
let currentUser=null,isAdmin=false,currentTab='all',activeFilter='',levels=[],allTags=[],levelTags={};
const $=id=>document.getElementById(id);
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function sortLvls(a,b){if(currentTab==='new')return new Date(b.created_at||0)-new Date(a.created_at||0);if(+b.difficulty!==+a.difficulty)return +b.difficulty-+a.difficulty;return (a.title||'').localeCompare(b.title||'');}
function getTags(id){return levelTags[id]||[];}
function isNew(l){return l.created_at&&(new Date()-new Date(l.created_at))<7*24*60*60*1000;}
async function loadLevels(){
    const{data}=await sb.from('levels').select('*');
    levels=(data||[]).map(l=>({...l,name:l.title}));
    levels.forEach(l=>{if(l.tags&&!levelTags[l.id])levelTags[l.id]=l.tags.split(',').map(t=>t.trim()).filter(t=>t);});
    allTags=[];levels.forEach(l=>getTags(l.id).forEach(t=>{if(!allTags.includes(t))allTags.push(t);}));
}
async function addLevel(name,diff,tags){
    const{error}=await sb.from('levels').insert({title:name,difficulty:parseInt(diff)||0,tags:tags.join(','),points:0,created_at:new Date().toISOString()});
    if(error){alert(error.message);return;}
    await loadLevels();render();
}
function render(){
    $('listHeaderLabel').textContent=currentTab==='new'?'New Levels':'Levels';
    const list=$('levelList'),q=($('searchInput')?.value||'').toLowerCase();
    list.innerHTML='';
    if(!levels.length){$('emptyState').style.display='block';list.style.display='none';$('listCount').textContent='0';return;}
    let f=levels.filter(l=>{if(currentTab==='new'&&!isNew(l))return false;return (l.title||'').toLowerCase().includes(q)||getTags(l.id).some(t=>t.includes(q))||(!activeFilter||getTags(l.id).includes(activeFilter));});
    f.sort(sortLvls);
    if(!f.length){$('emptyState').style.display='block';list.style.display='none';$('listCount').textContent='0';return;}
    $('emptyState').style.display='none';list.style.display='flex';$('listCount').textContent=f.length;
    f.forEach((l,i)=>{
        const c=document.createElement('div');c.className='level-card';
        const tags=getTags(l.id),tHTML=tags.length?'<div class="level-tags">'+tags.map(t=>`<span class="level-tag">${esc(t)}</span>`).join('')+'</div>':'';
        c.innerHTML=`<span class="level-rank">${currentTab==='new'?'':'#'+(i+1)}</span><div class="level-info"><div class="level-name">${esc(l.title)}${isNew(l)?'<span class="new-badge">NEW</span>':''}</div>${tHTML}<div class="level-difficulty">difficulty: <strong>${parseInt(l.difficulty||0)}</strong></div></div>`;
        list.appendChild(c);
    });
    const bar=$('filterBar');bar.innerHTML='<span class="filter-tag'+(activeFilter===''?' active':'')+'" data-tag="">All</span>';
    allTags.forEach(t=>{bar.innerHTML+=`<span class="filter-tag${activeFilter===t?' active':''}" data-tag="${t}">${t}</span>`;});
    bar.querySelectorAll('.filter-tag').forEach(el=>el.addEventListener('click',function(){activeFilter=this.dataset.tag;render();}));
}
document.addEventListener('DOMContentLoaded',()=>{
    $('searchInput').addEventListener('input',render);
    $('addBtn').addEventListener('click',()=>{if(!isAdmin)return;$('levelNameInput').value='';$('levelDifficultyInput').value='';$('levelTagsInput').value='';$('modalOverlay').classList.add('active');});
    $('modalCancel').addEventListener('click',()=>$('modalOverlay').classList.remove('active'));
    $('modalOk').addEventListener('click',async()=>{
        const name=$('levelNameInput').value.trim(),diff=$('levelDifficultyInput').value,tagsS=$('levelTagsInput').value.trim(),tags=tagsS?tagsS.split(',').map(t=>t.trim().toLowerCase()).filter(t=>t):[];
        if(!name||isNaN(parseInt(diff)))return;
        await addLevel(name,diff,tags);$('modalOverlay').classList.remove('active');render();
    });
    $('signInBtn').addEventListener('click',()=>$('authOverlay').style.display='flex');
    let isLogin=true;
    $('authSwitchBtn').addEventListener('click',()=>{isLogin=!isLogin;$('authSubmitBtn').textContent=isLogin?'Sign In':'Create Account';$('authSwitchBtn').textContent=isLogin?'Create account':'Back to sign in';});
    $('authSubmitBtn').addEventListener('click',async()=>{
        const e=$('authEmail').value.trim(),p=$('authPassword').value;
        if(!e||!p){$('authError').textContent='Enter email and password';return;}
        if(isLogin){const{data,error}=await sb.auth.signInWithPassword({email:e,password:p});if(error){$('authError').textContent=error.message;return;}currentUser=data.user;await loadUser();$('authOverlay').style.display='none';showLoggedIn();}
        else{const{data,error}=await sb.auth.signUp({email:e,password:p});if(error){$('authError').textContent=error.message;return;}if(data.user){currentUser=data.user;await sb.from('profiles').insert({id:currentUser.id,username:e.split('@')[0],total_score:0,levels_completed:0});await loadUser();$('authOverlay').style.display='none';showLoggedIn();}}
    });
    $('logoutBtn').addEventListener('click',async()=>{await sb.auth.signOut();location.reload();});
    document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));this.classList.add('active');currentTab=this.dataset.tab;render();}));
    (async()=>{const{data:{session}}=await sb.auth.getSession();if(session){currentUser=session.user;await loadUser();showLoggedIn();}else{await loadLevels();render();}})();
});
async function loadUser(){const{data:p}=await sb.from('profiles').select('username').eq('id',currentUser.id).maybeSingle();isAdmin=p&&p.username==='admin';await loadLevels();}
function showLoggedIn(){$('guestBadge').style.display='none';$('signInBtn').style.display='none';$('logoutBtn').style.display='block';if(isAdmin)$('bottomBar').style.display='flex';render();}
</script>
</body>
</html>
